<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rewards · Screenwise Select Panel</title>
<meta name="ext-resource-dependency" content="assets/logo.png" data-resource-id="logoMain" />
<meta name="ext-resource-dependency" content="assets/logo-amazon.png" data-resource-id="logoAmazon" />
<meta name="ext-resource-dependency" content="assets/logo-googleplay.png" data-resource-id="logoGoogleplay" />
<meta name="ext-resource-dependency" content="assets/logo-deliveroo.png" data-resource-id="logoDeliveroo" />
<meta name="ext-resource-dependency" content="assets/logo-asos.png" data-resource-id="logoAsos" />
<meta name="ext-resource-dependency" content="assets/logo-primark.png" data-resource-id="logoPrimark" />
<meta name="ext-resource-dependency" content="assets/logo-adidas.png" data-resource-id="logoAdidas" />
<meta name="ext-resource-dependency" content="assets/logo-footlocker.png" data-resource-id="logoFootlocker" />
<meta name="ext-resource-dependency" content="assets/logo-tkmaxx.png" data-resource-id="logoTkmaxx" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root{
    --gold:#C9862A; --gold-light:#E8A030; --gold-dark:#A06820;
    --gold-muted:rgba(201,134,42,0.15); --gold-subtle:rgba(201,134,42,0.07);
    --heading:#2C2C2C; --body:#5C5C5C; --label:#9A9A9A;
    --bg:#FAFAFA; --card:#FFFFFF; --border:#ECECEC;
    --shadow:0 2px 12px rgba(0,0,0,0.06);
    --shadow-hover:0 14px 34px rgba(201,134,42,0.18);
    --radius-card:16px;
    --wrap:1200px;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{font-family:'Inter','Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--body);
    -webkit-font-smoothing:antialiased;line-height:1.65}
  .wrap{max-width:var(--wrap);margin:0 auto;padding:0 24px;width:100%}
  h1,h2,h3{color:var(--heading);line-height:1.15;letter-spacing:-0.5px}
  strong{font-weight:700;color:inherit}

  /* buttons */
  .pill{display:inline-flex;align-items:center;gap:7px;font:600 14px/1 'Inter',sans-serif;
    border:none;border-radius:50px;padding:11px 22px;cursor:pointer;transition:.18s ease;white-space:nowrap}
  .pill-gold{background:var(--gold);color:#fff}
  .pill-gold:hover{background:var(--gold-dark)}
  .pill-dark{background:var(--gold-dark);color:#fff}
  .pill-dark:hover{background:#8a5818}
  .pill-light{background:#E0A740;color:#fff;padding:9px 18px;font-size:13px}
  .pill-light:hover{background:var(--gold)}

  /* nav */
  .nav{position:sticky;top:0;z-index:90;background:#fff;box-shadow:0 1px 0 var(--border)}
  .nav-inner{max-width:var(--wrap);margin:0 auto;padding:0 24px;height:72px;display:flex;align-items:center;gap:24px}
  .logo img{height:38px;display:block}
  .nav-links{display:flex;gap:34px;margin:0 auto}
  .nav-link{font:600 15px/1 'Inter',sans-serif;color:var(--heading);text-decoration:none;
    padding:6px 0;position:relative;transition:color .15s}
  .nav-link:hover{color:var(--gold)}
  .nav-link.active{color:var(--gold)}
  .nav-link.active::after{content:"";position:absolute;left:0;right:0;bottom:-26px;height:3px;
    background:var(--gold);border-radius:3px}
  .nav-ctas{display:flex;gap:8px}

  /* hero */
  .hero{position:relative;overflow:hidden;padding:52px 0 58px}
  .hero-gradient{background:linear-gradient(120deg,#E8A030 0%,#C9862A 52%,#A06820 100%)}
  .hero-solid{background:var(--gold)}
  .hero-cream{background:linear-gradient(120deg,#FBF1E0,#F6E6CC)}
  .hero-amber{background:#F6D281}
  .hero-inner{display:grid;grid-template-columns:1.35fr .9fr;gap:48px;align-items:center;position:relative;z-index:2}
  .hero-copy .hero-eyebrow{display:inline-block;font:700 12px/1 'Inter',sans-serif;letter-spacing:1.4px;
    text-transform:uppercase;color:#fff;background:rgba(255,255,255,.22);padding:7px 14px;border-radius:50px;margin-bottom:20px}
  .hero h1{font-size:56px;font-weight:800;color:#fff;margin-bottom:20px;letter-spacing:-1.4px}
  .hero-sub{font-size:18px;line-height:1.6;color:rgba(255,255,255,.92);max-width:560px;margin-bottom:28px}
  .rate-pill{display:inline-flex;align-items:center;gap:9px;background:#fff;color:var(--gold-dark);
    font-weight:600;font-size:15px;padding:11px 20px;border-radius:50px;box-shadow:0 6px 18px rgba(0,0,0,.12)}
  .rate-pill strong{color:var(--heading);margin-left:-2px}
  /* cream variant text fixes */
  .hero-cream .hero-eyebrow,.hero-amber .hero-eyebrow{background:var(--gold-muted);color:var(--gold-dark)}
  .hero-cream h1,.hero-amber h1{color:var(--heading)}
  .hero-cream .hero-sub,.hero-amber .hero-sub{color:var(--body)}

  .callout{background:#fff;border-radius:24px;padding:34px 30px;text-align:center;
    box-shadow:0 20px 50px rgba(160,104,32,.28);position:relative}
  .callout-label{display:block;font:600 13px/1 'Inter',sans-serif;text-transform:uppercase;
    letter-spacing:1px;color:var(--label);margin-bottom:6px}
  .callout-value{display:block;font-size:78px;font-weight:800;color:var(--gold);line-height:.95;letter-spacing:-3px}
  .callout-sub{display:block;font-size:19px;font-weight:700;color:var(--heading);margin-top:6px}
  .callout-foot{display:inline-flex;align-items:center;gap:7px;margin-top:18px;font-size:13px;
    font-weight:600;color:var(--gold-dark);background:var(--gold-subtle);padding:8px 14px;border-radius:50px}

  .hero-decor{position:absolute;inset:0;z-index:1;pointer-events:none;color:rgba(255,255,255,.5)}
  .hero-cream .hero-decor,.hero-amber .hero-decor{color:var(--gold-outline,rgba(201,134,42,.35))}
  .hero-decor .d{position:absolute}
  .hero-decor .d1{top:14%;left:46%}
  .hero-decor .d2{bottom:16%;left:8%}
  .hero-decor .d3{top:24%;left:2%}
  .hero-decor .d4{top:60%;right:30%}
  .hero-decor .d5{bottom:24%;right:5%}
  .hero-decor .d6{top:12%;right:14%}
  .hero-decor .d7{top:46%;left:30%}
  .hero-decor .d8{bottom:12%;left:38%}
  .hero-decor .d9{top:70%;left:14%}
  .hero-decor .d10{top:38%;right:2%}
  .hero-decor .d11{top:8%;left:22%}
  .hero-decor .d12{bottom:30%;left:22%}
  .hero-decor .d13{top:32%;left:14%}
  .hero-decor .d14{bottom:8%;right:24%}
  .hero-decor .d15{top:54%;right:18%}

  /* generic section */
  .section{padding:80px 0}
  .section-tint{background:linear-gradient(180deg,#fff, #FCF7EF)}
  .section-store{padding:44px 0 52px}
  .section-head{max-width:620px;margin-bottom:44px}
  .eyebrow{display:inline-block;font:700 12px/1 'Inter',sans-serif;letter-spacing:1.4px;
    text-transform:uppercase;color:var(--gold);margin-bottom:14px}
  .section h2{font-size:38px;font-weight:800;letter-spacing:-1px;margin-bottom:14px}
  .section-sub{font-size:17px;color:var(--body);text-wrap:pretty}

  /* how you earn — two feature cards */
  .earn-grid{position:relative;display:grid;grid-template-columns:1fr 1fr;gap:26px;margin-bottom:28px}
  .earn-plus{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:3;
    width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    background:#fff;color:#C9862A;font-size:40px;font-weight:700;line-height:1;
    box-shadow:0 10px 28px rgba(160,104,32,.32);border:1px solid rgba(201,134,42,.18)}
  .earn-card{position:relative;overflow:hidden;border-radius:24px;padding:40px;color:#fff;
    display:flex;flex-direction:column;min-height:360px;box-shadow:0 18px 44px rgba(160,104,32,.22)}
  .earn-monthly{background:linear-gradient(140deg,#E9A93E 0%,#D6912C 60%,#C9862A 100%);
    min-height:0;padding:30px;align-self:center}
  .earn-monthly .earn-icon{width:48px;height:48px;border-radius:13px;margin-bottom:16px}
  .earn-monthly .earn-value{font-size:38px}
  .earn-monthly .earn-desc{margin:14px 0 20px}
  .earn-bonus{background:#ffc24a;min-height:0;padding:30px;align-self:center;color:#4A2E08}
  .earn-bonus .earn-label{color:#7A4E12}
  .earn-bonus .earn-unit{color:rgba(74,46,8,.82)}
  .earn-bonus .earn-desc{color:rgba(74,46,8,.9)}
  .earn-bonus .earn-icon{width:48px;height:48px;border-radius:13px;margin-bottom:16px;
    background:rgba(74,46,8,.14);color:#4A2E08}
  .earn-bonus .earn-value{font-size:38px;color:#4A2E08}
  .earn-bonus .earn-desc{margin:14px 0 20px}
  .earn-icon{width:58px;height:58px;border-radius:16px;background:rgba(255,255,255,.2);
    display:flex;align-items:center;justify-content:center;color:#fff;margin-bottom:20px}
  .earn-body{margin-top:auto;display:flex;flex-direction:column}
  .earn-label{font:700 12px/1 'Inter',sans-serif;letter-spacing:1.4px;text-transform:uppercase;
    color:rgba(255,255,255,.82);margin-bottom:12px}
  .earn-value{font-size:46px;font-weight:800;letter-spacing:-1.8px;line-height:1.02}
  .earn-unit{display:block;font-size:19px;font-weight:600;letter-spacing:-.2px;color:rgba(255,255,255,.9);margin-top:6px}
  .earn-desc{font-size:15px;line-height:1.6;color:rgba(255,255,255,.92);margin:18px 0 26px;max-width:440px}
  .earn-cta{display:inline-flex;align-items:center;gap:7px;align-self:flex-start;background:transparent;
    border:1.6px solid rgba(255,255,255,.85);color:#fff;border-radius:50px;padding:11px 24px;
    font:600 14px/1 'Inter',sans-serif;cursor:pointer;transition:.18s ease}
  .earn-cta:hover{background:#fff;color:var(--gold-dark);border-color:#fff}
  .earn-bonus .earn-cta{border-color:rgba(74,46,8,.55);color:#4A2E08}
  .earn-bonus .earn-cta:hover{background:#4A2E08;color:#ffc24a;border-color:#4A2E08}
  .earn-foot{display:grid;grid-template-columns:1fr;gap:16px}
  .earn-foot .info-banner{margin-bottom:0}
  .earn-foot .note-box{margin:0}

  /* info banner + note box (supporting) */
  .info-banner{display:flex;align-items:center;gap:12px;background:var(--card);
    border-left:4px solid var(--gold);border-radius:10px;padding:16px 22px;
    font-size:15px;color:var(--heading);box-shadow:var(--shadow)}
  .ib-icon{color:var(--gold);display:flex}
  .note-box{display:flex;align-items:flex-start;gap:14px;background:var(--card);
    border-left:4px solid var(--gold);border-radius:10px;padding:18px 24px;box-shadow:var(--shadow)}
  .nb-icon{color:var(--gold);margin-top:2px;flex-shrink:0}
  .note-box p{font-size:15px;line-height:1.55;color:var(--body)}
  .redeem-grid{display:grid;grid-template-columns:1fr 1fr;gap:26px;margin-bottom:30px}
  .reward-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-card);
    padding:34px 34px 32px;box-shadow:var(--shadow);display:flex;flex-direction:column;transition:.2s ease}
  .reward-card:hover{box-shadow:var(--shadow-hover);border-color:var(--gold-muted)}
  .reward-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
  .reward-icon{width:58px;height:58px;border-radius:16px;background:var(--gold-muted);color:var(--gold);
    display:flex;align-items:center;justify-content:center}
  .reward-tag{font:700 11px/1 'Inter',sans-serif;letter-spacing:.6px;text-transform:uppercase;
    color:var(--gold-dark);background:var(--gold-muted);padding:7px 12px;border-radius:50px}
  .reward-tag.tag-soft{color:var(--body);background:#F3F3F3}
  .reward-card h3{font-size:24px;font-weight:800;margin-bottom:10px}
  .reward-card p{font-size:15px;line-height:1.6;color:var(--body);margin-bottom:20px}
  .logo-strip{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:24px}
  .logo-chip{font-size:13px;font-weight:600;color:var(--body);background:var(--bg);
    border:1px solid var(--border);border-radius:8px;padding:7px 12px}
  .logo-chip.more{color:var(--gold-dark);background:var(--gold-subtle);border-color:var(--gold-muted)}
  .charity-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:24px}
  .charity-pick{display:inline-flex;align-items:center;gap:6px;font:600 13px/1 'Inter',sans-serif;
    color:var(--body);background:var(--bg);border:1.5px solid var(--border);border-radius:50px;
    padding:9px 16px;cursor:pointer;transition:.15s}
  .charity-pick:hover{border-color:var(--gold)}
  .charity-pick.picked{color:var(--gold-dark);background:var(--gold-subtle);border-color:var(--gold)}
  .charity-pick svg{color:var(--gold)}
  .reward-cta{margin-top:auto;align-self:flex-start}
  .min-note{display:inline-flex;align-items:center;gap:10px;color:var(--gold-dark);
    background:var(--gold-subtle);border-radius:50px;padding:12px 22px;font-size:15px}

  /* reward store (YouGov-style cards) */
  .store-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:24px}
  .store-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-card);
    overflow:hidden;box-shadow:var(--shadow);display:flex;flex-direction:column;cursor:pointer;transition:.2s ease}
  .store-card:hover{transform:translateY(-6px);box-shadow:0 10px 24px rgba(0,0,0,.08);border-color:var(--gold-muted)}
  .store-panel{height:160px;display:flex;align-items:center;justify-content:center}
  .store-panel-logo{margin:16px 16px 0;height:150px;border:1px solid var(--border);border-radius:12px;background:#fff;padding:24px}
  .store-logo{max-width:100%;max-height:100%;object-fit:contain;display:block}
  .store-body{padding:20px 22px 20px;display:flex;flex-direction:column;gap:14px;flex:1}
  .store-title{font-size:18px;font-weight:700;color:var(--heading)}
  .store-meta{display:flex;align-items:center;justify-content:space-between}
  .store-price{font-size:20px;font-weight:800;color:var(--heading)}
  .store-points{display:inline-flex;align-items:center;gap:7px;color:var(--gold-dark);font-weight:600;font-size:15px}
  .store-points svg{color:var(--gold)}
  .store-foot{display:flex;align-items:center;justify-content:space-between;
    border-top:1px solid var(--border);padding-top:16px;margin-top:auto}
  .store-status{font-size:15px;font-weight:600;color:var(--label)}
  .store-lock{width:44px;height:44px;border-radius:50%;background:var(--bg);color:var(--label);
    display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .store-card:hover .store-lock{background:var(--gold-muted);color:var(--gold-dark)}

  /* modal */
  .modal-scrim{position:fixed;inset:0;background:rgba(44,44,44,.5);z-index:200;display:flex;
    align-items:center;justify-content:center;padding:24px;animation:fade .2s ease}
  .modal{background:#fff;border-radius:22px;padding:38px;max-width:560px;width:100%;position:relative;
    box-shadow:0 30px 70px rgba(0,0,0,.3);animation:pop .22s ease}
  .modal-x{position:absolute;top:20px;right:20px;width:34px;height:34px;border:none;border-radius:50%;
    background:var(--bg);color:var(--body);cursor:pointer;display:flex;align-items:center;justify-content:center}
  .modal-x:hover{background:var(--gold-muted);color:var(--gold-dark)}
  .modal-title{font-size:26px;font-weight:800;margin:6px 0 8px}
  .modal-sub{font-size:15px;color:var(--body);margin-bottom:24px}
  .voucher-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  .voucher-item{display:flex;flex-direction:column;align-items:center;gap:4px;padding:18px 10px;
    background:var(--bg);border:1.5px solid var(--border);border-radius:14px;cursor:pointer;transition:.15s}
  .voucher-item:hover{border-color:var(--gold);background:var(--gold-subtle);transform:translateY(-3px)}
  .voucher-name{font-size:14px;font-weight:700;color:var(--heading)}
  .voucher-from{font-size:11px;color:var(--label)}

  /* toast */
  .toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);z-index:300;
    display:flex;align-items:center;gap:9px;background:var(--heading);color:#fff;font-size:14px;
    font-weight:600;padding:14px 24px;border-radius:50px;box-shadow:0 12px 30px rgba(0,0,0,.28);
    animation:rise .3s ease}
  .toast svg{color:var(--gold-light)}

  /* footer */
  .footer{background:#fff;border-top:1px solid var(--border);padding:40px 0}
  .footer-inner{display:flex;align-items:center;justify-content:space-between;gap:24px;flex-wrap:wrap}
  .footer-brand{display:flex;align-items:center;gap:12px}
  .footer-by{font-size:13px;color:var(--label)}
  .footer-logos{display:flex;gap:8px}
  .brand-pill{font:700 12px/1 'Inter',sans-serif;background:var(--bg);color:var(--heading);
    border:1px solid var(--border);border-radius:50px;padding:6px 14px}
  .footer-links{display:flex;gap:24px;flex-wrap:wrap}
  .footer-links a{font-size:13px;color:var(--body);text-decoration:none}
  .footer-links a:hover{color:var(--gold)}
  .footer-copy{font-size:12px;color:var(--label)}

  @keyframes fade{from{opacity:0}to{opacity:1}}
  @keyframes pop{from{opacity:0;transform:scale(.95) translateY(10px)}to{opacity:1;transform:none}}
  @keyframes rise{from{opacity:0;transform:translate(-50%,14px)}to{opacity:1;transform:translate(-50%,0)}}

  /* responsive */
  @media(max-width:980px){
    .nav-links{display:none}
    .hero-inner{grid-template-columns:1fr;gap:32px}
    .hero h1{font-size:42px}
    .earn-grid{grid-template-columns:1fr}
    .earn-foot{grid-template-columns:1fr}
    .redeem-grid{grid-template-columns:1fr}
    .store-grid{grid-template-columns:repeat(2,1fr)}
    .voucher-grid{grid-template-columns:repeat(3,1fr)}
  }
  @media(max-width:620px){
    .nav-ctas .pill:not(.pill-dark){display:none}
    .hero h1{font-size:36px}
    .section h2{font-size:30px}
    .earn-card{padding:32px;min-height:320px}
    .store-grid{grid-template-columns:1fr}
    .voucher-grid{grid-template-columns:repeat(2,1fr)}
    .footer-inner{flex-direction:column;text-align:center}
  }

  template{display:none}
</style>
</head>
<body>
<div id="root"></div>

<template id="__bundler_thumbnail" data-bg-color="#C9862A">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" rx="18" fill="#C9862A"/>
    <g fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
      <rect x="32" y="46" width="36" height="8" rx="2"/>
      <path d="M36 54v18h28V54"/>
      <line x1="50" y1="46" x2="50" y2="72"/>
      <path d="M50 46h-9a4.5 4.5 0 0 1 0-9c6 0 9 9 9 9z"/>
      <path d="M50 46h9a4.5 4.5 0 0 0 0-9c-6 0-9 9-9 9z"/>
    </g>
  </svg>
</template>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="rewards-app.jsx"></script>
</body>
</html>
